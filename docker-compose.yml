version: "3.9"

# ─────────────────────────────────────────────────────────────
#  AI Medical Report Analyzer — Docker Compose
#  Services: MongoDB · Zookeeper · Kafka · API Gateway
#            Auth Service · Report Processing · AI Analysis
# ─────────────────────────────────────────────────────────────

networks:
  medical-net:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:

services:

  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: medical-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - medical-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (required by Kafka) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: medical-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - medical-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: medical-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - medical-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka Topic Initializer (one-shot) ─────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: medical-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - medical-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic report-extracted
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic report-analyzed
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic notifications
        echo "Kafka topics created successfully."

  # ── Auth Service ───────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: medical-auth-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongodb:27017/medical_auth
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
    networks:
      - medical-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Report Processing Service ──────────────────────────────
  report-service:
    build:
      context: ./services/report-processing
      dockerfile: Dockerfile
    container_name: medical-report-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 5002
      MONGO_URI: mongodb://mongodb:27017/medical_reports
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: report-service
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
    networks:
      - medical-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── AI Analysis Service ────────────────────────────────────
  ai-analysis-service:
    build:
      context: ./services/ai-analysis
      dockerfile: Dockerfile
    container_name: medical-ai-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ai-analysis-service
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
    networks:
      - medical-net

  # ── API Gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:5001
      REPORT_SERVICE_URL: http://report-service:5002
    networks:
      - medical-net

  # ── Frontend (Vite dev build) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    networks:
      - medical-net
